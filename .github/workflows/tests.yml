name: tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  tests:
    name: ./test.sh
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-24.04' }}
          - os: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-macos-8x14' || 'macos-latest' }}
    steps:
    - uses: actions/checkout@v4
    - uses: commaai/timeout@v1
      with:
        timeout: ${{ github.repository == 'commaai/opendbc' && '90' || '999' }}
    - run: ./test.sh

  safety_tests:
    name: safety
    runs-on: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-latest' }}
    steps:
    - uses: commaai/timeout@v1
      with:
        timeout: ${{ github.repository == 'commaai/opendbc' && '60' || '999' }}
    - uses: actions/checkout@v4
    - name: Run safety tests
      run: ./opendbc/safety/tests/test.sh

  mutation:
    name: Safety mutation tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-latest' }}
          - os: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-macos-8x14' || 'macos-latest' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run mutation tests
        run: |
          source setup.sh
          scons -j8
          python opendbc/safety/tests/mutation.py

  car_diff:
    name: car diff
    runs-on: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-latest' }}
    env:
      GIT_REF: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.before || format('origin/{0}', github.event.repository.default_branch) }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Build opendbc
      run: |
        source setup.sh
        scons -j8
    - name: Test car diff
      if: github.event_name == 'pull_request'
      run: source setup.sh && python opendbc/car/tests/car_diff.py | tee diff.txt
    - name: Upload diff
      if: always() && github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: car_diff_${{ github.event.number }}
        path: diff.txt
    - name: Update refs
      if: github.repository == 'commaai/opendbc' && github.ref == 'refs/heads/master'
      run: source setup.sh && python opendbc/car/tests/car_diff.py --update-refs
    - name: Checkout ci-artifacts
      if: github.repository == 'commaai/opendbc' && github.ref == 'refs/heads/master'
      uses: actions/checkout@v4
      with:
        repository: commaai/ci-artifacts
        ssh-key: ${{ secrets.CI_ARTIFACTS_DEPLOY_KEY }}
        path: ${{ github.workspace }}/ci-artifacts
    - name: Push refs
      if: github.repository == 'commaai/opendbc' && github.ref == 'refs/heads/master'
      working-directory: ${{ github.workspace }}/ci-artifacts
      run: |
        ls ${{ github.workspace }}/car_diff/*.zst 2>/dev/null || exit 0
        git config user.name "GitHub Actions Bot"
        git config user.email "<>"
        git fetch origin car_diff || true
        git checkout car_diff 2>/dev/null || git checkout --orphan car_diff
        cp ${{ github.workspace }}/car_diff/*.zst .
        git add *.zst
        git commit -m "car_diff refs for ${{ github.sha }}" || echo "No changes to commit"
        git push origin car_diff

  # TODO: this needs to move to opendbc
  test_models:
    name: test models
    runs-on: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        job: [0, 1, 2, 3]
    env:
      CI: 1
    steps:
    - uses: actions/checkout@v4
      with:
        repository: 'commaai/openpilot'
        ref: '41994b1d27423e8a10008019a962417bf0f5f974'
        submodules: true
    - run: ./tools/op.sh setup
    - run: rm -rf opendbc_repo/
    - uses: actions/checkout@v4
      with:
        path: opendbc_repo
    - name: Cache test routes
      id: routes-cache
      uses: actions/cache@v4
      with:
        path: /tmp/comma_download_cache
        key: car_models-${{ hashFiles('selfdrive/car/tests/test_models.py', 'opendbc/car/tests/routes.py') }}-${{ matrix.job }}
    - name: Build openpilot
      run: scons -j$(nproc) common/ cereal/ selfdrive/pandad/ msgq_repo/ opendbc_repo
    - name: Test car models
      timeout-minutes: ${{ contains(runner.name, 'nsc') && (steps.routes-cache.outputs.cache-hit == 'true') && 2 || 999 }}
      run: |
        set -euxo pipefail
        PYTEST_LOG="/tmp/test_models_pytest.log"
        RESOURCE_LOG="/tmp/test_models_resource_monitor.log"

        echo "Runner: ${{ runner.name }}"
        echo "CPU cores: $(nproc)"
        free -h || true
        df -h || true
        cat /sys/fs/cgroup/memory.max || true

        # Periodically sample resource usage so abrupt terminations have context.
        (
          while true; do
            echo "===== $(date -Is) ====="
            free -h || true
            ps -eo pid,ppid,%cpu,%mem,rss,cmd --sort=-rss | sed -n '1,40p'
            sleep 20
          done
        ) > "${RESOURCE_LOG}" 2>&1 &
        MONITOR_PID=$!

        cleanup() {
          kill "${MONITOR_PID}" 2>/dev/null || true
        }

        on_term() {
          echo "Received SIGTERM at $(date -Is)" | tee -a "${PYTEST_LOG}"
          cleanup
          exit 143
        }

        trap on_term TERM
        trap cleanup EXIT

        export MAX_EXAMPLES=1
        /usr/bin/time -v pytest --continue-on-collection-errors --durations=0 --durations-min=5 -n ${{ contains(runner.name, 'nsc') && 'logical' || '1' }} selfdrive/car/tests/test_models.py 2>&1 | tee "${PYTEST_LOG}"
      env:
        NUM_JOBS: 4
        JOB_ID: ${{ matrix.job }}
    - name: Collect test model diagnostics
      if: always()
      run: |
        set -euxo pipefail
        SYSTEM_LOG="/tmp/test_models_system.log"
        {
          echo "=== Timestamp ==="
          date -Is
          echo "=== ulimit ==="
          ulimit -a || true
          echo "=== cgroup memory ==="
          cat /sys/fs/cgroup/memory.max || true
          cat /sys/fs/cgroup/memory.current || true
          echo "=== OOM hints from dmesg ==="
          dmesg -T 2>/dev/null | rg -i "out of memory|oom|killed process" | tail -n 200 || true
        } | tee "${SYSTEM_LOG}"
    - name: Upload test model diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-models-diagnostics-${{ matrix.job }}
        if-no-files-found: warn
        path: |
          /tmp/test_models_pytest.log
          /tmp/test_models_resource_monitor.log
          /tmp/test_models_system.log
