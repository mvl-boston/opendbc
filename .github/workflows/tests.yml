name: tests

on:
  push:
    branches:
      - master
  pull_request:

env:
  PARENT_MVL_BRANCH: deleteme

jobs:
  tests:
    name: ./test.sh
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'mvl-boston/openpilot'
          ref: ${{ env.PARENT_MVL_BRANCH }}
          submodules: true

      - run: ./tools/op.sh setup
      - run: rm -rf opendbc_repo/

      - uses: actions/checkout@v4
        with:
          path: opendbc_repo

      - name: Cache test routes
        id: routes-cache
        uses: actions/cache@v4
        with:
          path: /tmp/comma_download_cache
          key: car_models-${{ hashFiles('selfdrive/car/tests/test_models.py', 'opendbc/car/tests/routes.py') }}-global

      - name: Build openpilot
        run: scons -j1 common/ cereal/ selfdrive/pandad/ msgq_repo/ opendbc_repo

      # =========================
      # FIXED CROSS-PLATFORM GO
      # =========================
      - name: Install Go (cross-platform)
        shell: bash
        run: |
          set -e

          OS="$(uname -s)"
          ARCH="$(uname -m)"

          if [ "$OS" = "Linux" ]; then
            GO_OS="linux"
          elif [ "$OS" = "Darwin" ]; then
            GO_OS="darwin"
          else
            echo "Unsupported OS: $OS"
            exit 1
          fi

          if [ "$ARCH" = "x86_64" ]; then
            GO_ARCH="amd64"
          elif [ "$ARCH" = "arm64" ]; then
            GO_ARCH="arm64"
          else
            echo "Unsupported arch: $ARCH"
            exit 1
          fi

          GO_VERSION="1.22.5"

          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.${GO_OS}-${GO_ARCH}.tar.gz" -o go.tar.gz

          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go.tar.gz

          export PATH=/usr/local/go/bin:$PATH
          go version

          go install github.com/evilmartians/lefthook@latest

          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Verify lefthook
        run: |
          export PATH="$HOME/go/bin:$PATH"
          lefthook version

      - name: ./test.sh
        timeout-minutes: ${{ contains(runner.name, 'nsc') && 2 || 999 }}
        run: opendbc_repo/test.sh
        env:
          PYTHONPATH: ${{ github.workspace }}/openpilot:${{ github.workspace }}

  safety_tests:
    name: safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./opendbc/safety/tests/test.sh

  mutation:
    name: Safety mutation tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          source setup.sh
          python opendbc/safety/tests/mutation.py

  car_diff:
    name: car diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: source setup.sh && python opendbc/car/tests/car_diff.py

  test_models:
    name: test models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'mvl-boston/openpilot'
      - run: ./tools/op.sh setup
      - run: rm -rf opendbc_repo/
      - uses: actions/checkout@v4
        with:
          path: opendbc_repo
      - run: scons -j2 common/ cereal/ selfdrive/pandad/ msgq_repo/ opendbc_repo
      - run: pytest selfdrive/car/tests/test_models.py
