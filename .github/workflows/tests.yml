name: tests

on:
  push:
    branches:
      - master
  pull_request:

env:
  PARENT_MVL_BRANCH: 0101-honda-spacelab

jobs:
  tests:
    name: ./test.sh
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-24.04' }}
          - os: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-macos-8x14' || 'macos-latest' }}
    steps:
    - uses: actions/checkout@v4
      with:
        repository: 'mvl-boston/openpilot'
        ref: ${{ env.PARENT_MVL_BRANCH }}
        submodules: true
    - name: Patch openpilot setup inputs
      run: |
        perl -0pi -e 's/sha256:fbf0ea9be67e65cd45d38ff930e3d49f705dd76c9ddbd1e1482e3f87b61efcef/sha256:d0afaf3b005e35e14b929d5491d2d5b64562d0c1cd5093ba969fb63908670dd4/g' uv.lock
        perl -0pi -e 's/\nbrew "font-noto-color-emoji"//g' tools/mac_setup.sh
    - uses: actions/checkout@v4
      with:
        path: opendbc_repo
    - uses: ./opendbc_repo/.github/workflows/cache
      id: cache
    - uses: commaai/timeout@v1
      with:
        timeout: ${{ github.repository == 'commaai/opendbc' && (steps.cache.outputs.cache-hit == 'true' && '60' || '90') || '999' }}
    - run: ./tools/op.sh setup
    - run: rm -rf opendbc_repo/
    - uses: actions/checkout@v4
      with:
        path: opendbc_repo
    - name: Build host openpilot
      run: |
        source .venv/bin/activate
        scons -j$(python -c 'import os; print(os.cpu_count() or 1)') common/
    - name: Run opendbc tests in host env
      run: |
        cd opendbc_repo
        export UV_PROJECT_ENVIRONMENT="$GITHUB_WORKSPACE/.venv"
        uv sync --all-extras --inexact
        source "$UV_PROJECT_ENVIRONMENT/bin/activate"
        uv lock --check
        scons -j$(python -c 'import os; print(os.cpu_count() or 1)')
        lefthook run test

  safety_tests:
    name: safety
    runs-on: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        flags: ['--ubsan']
    steps:
    - uses: commaai/timeout@v1
      with:
        timeout: ${{ github.repository == 'commaai/opendbc' && '60' || '999' }}
    - uses: actions/checkout@v4
    - uses: ./.github/workflows/cache
    - name: Run safety tests
      run: ./opendbc/safety/tests/test.sh ${{ matrix.flags }}

  mutation:
    name: Safety mutation tests
    runs-on: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-latest' }}
    timeout-minutes: 45
    env:
      GIT_REF: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.before || format('origin/{0}', github.event.repository.default_branch) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need master to get diff
      - uses: ./.github/workflows/cache
      - name: Run mutation tests
        run: |
          source setup.sh
          scons -j8
          cd opendbc/safety/tests && ./mutation.sh

  # TODO: this needs to move to opendbc
  test_models:
    name: test models
    runs-on: ${{ github.repository == 'commaai/opendbc' && 'namespace-profile-amd64-8x16' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        job: [0, 1, 2, 3]
    env:
      CI: 1
    steps:
    - uses: actions/checkout@v4
      with:
        repository: 'mvl-boston/openpilot'
        ref: ${{ env.PARENT_MVL_BRANCH }}
        submodules: true
    - name: Patch openpilot setup inputs
      run: |
        perl -0pi -e 's/sha256:fbf0ea9be67e65cd45d38ff930e3d49f705dd76c9ddbd1e1482e3f87b61efcef/sha256:d0afaf3b005e35e14b929d5491d2d5b64562d0c1cd5093ba969fb63908670dd4/g' uv.lock
        perl -0pi -e 's/\nbrew "font-noto-color-emoji"//g' tools/mac_setup.sh
    - run: ./tools/op.sh setup
    - name: Activate openpilot venv
      run: |
        source .venv/bin/activate
        echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
    - run: rm -rf opendbc_repo/
    - uses: actions/checkout@v4
      with:
        path: opendbc_repo
    - name: Cache test routes
      id: routes-cache
      uses: actions/cache@v4
      with:
        path: /tmp/comma_download_cache
        key: car_models-${{ hashFiles('selfdrive/car/tests/test_models.py', 'opendbc/car/tests/routes.py') }}-${{ matrix.job }}
    - name: Build openpilot
      run: scons -j$(nproc) common/ cereal/ selfdrive/pandad/ msgq_repo/ opendbc_repo
    - name: Test car models
      timeout-minutes: ${{ contains(runner.name, 'nsc') && (steps.routes-cache.outputs.cache-hit == 'true') && 2 || 999 }}
      run: MAX_EXAMPLES=1 pytest --continue-on-collection-errors --durations=0 --durations-min=5 -n ${{ contains(runner.name, 'nsc') && 'logical' || '0' }} selfdrive/car/tests/test_models.py
      env:
        NUM_JOBS: 4
        JOB_ID: ${{ matrix.job }}
